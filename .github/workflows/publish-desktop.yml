name: Publish desktop app

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "apps/docs/**"
      - "apps/menubar-tasks/**"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "public/**"
      - "packages/**"
      - "scripts/generate-prompts.ts"
      - "scripts/postinstall.mts"
      - "scripts/sync-desktop-version.mjs"
      - "scripts/check-desktop-version.mjs"
      - "vite.config.ts"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump when run manually"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

# Never cancel mid-upload — that left orphan releases with only .blockmap files.
concurrency:
  group: desktop-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip desktop]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Use npm 12.0.1
        run: npm install --global npm@12.0.1

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Decide whether to release
        id: plan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ship=true" >> "$GITHUB_OUTPUT"
            echo "Manual release requested"
            exit 0
          fi
          if npm run release:should-ship -w @arco/desktop; then
            echo "ship=true" >> "$GITHUB_OUTPUT"
          else
            echo "ship=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve next version
        if: steps.plan.outputs.ship == 'true'
        id: version
        run: |
          BUMP="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}"
          VERSION="$(node apps/desktop/scripts/next-desktop-version.mjs --bump="$BUMP")"
          DESKTOP_TAG="desktop-v${VERSION}"
          RELEASE_TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$DESKTOP_TAG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "Next release: $DESKTOP_TAG (GitHub release $RELEASE_TAG)"

      - name: Guard against duplicate desktop tag
        if: steps.plan.outputs.ship == 'true'
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Sync version files
        if: steps.plan.outputs.ship == 'true'
        run: node scripts/sync-desktop-version.mjs --set "${{ steps.version.outputs.version }}"

      - name: Commit version bump
        if: steps.plan.outputs.ship == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/VERSION package.json apps/desktop/package.json
          git commit -m "chore(desktop): release v${{ steps.version.outputs.version }} [skip desktop]"

      # Pre-create a single draft so parallel electron-builder publishers (dmg + zip)
      # upload into the same release instead of each creating their own.
      - name: Prepare draft GitHub release
        if: steps.plan.outputs.ship == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.release_tag }}"

          # Remove every release object for this tag (published or draft).
          for id in $(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq ".[] | select(.tag_name == \"$TAG\") | .id"); do
            echo "Deleting stale release id=$id for $TAG"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
          done

          git tag -f -a "$TAG" -m "Kosmos ${VERSION}"
          git push origin "$TAG" --force

          gh release create "$TAG" \
            --draft \
            --title "Kosmos ${VERSION}" \
            --notes "Desktop release ${VERSION}" \
            --target "$(git rev-parse HEAD)"

      - name: Build and publish draft to GitHub Releases
        if: steps.plan.outputs.ship == 'true'
        env:
          DESKTOP_VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESKTOP_UPDATE_GH_TOKEN: ${{ secrets.DESKTOP_UPDATE_GH_TOKEN }}
          CSC_LINK: ${{ secrets.DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.DESKTOP_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKTOP_APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DESKTOP_APPLE_TEAM_ID }}
          # Prefer draft upload path even if package.json is overridden locally.
          EP_DRAFT: "true"
        run: npm run release:publish -w @arco/desktop

      - name: Tag, publish release, and push
        if: steps.plan.outputs.ship == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          DESKTOP_TAG="${{ steps.version.outputs.tag }}"

          git tag -a "$DESKTOP_TAG" -m "Kosmos ${VERSION}"
          git tag -f -a "$RELEASE_TAG" -m "Kosmos ${VERSION}"

          # Publish the draft that actually received the DMG (guards against orphan drafts).
          RELEASE_ID="$(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq "[.[] | select(.tag_name == \"$RELEASE_TAG\") | select([.assets[].name] | any(endswith(\".dmg\")))] | .[0].id")"
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "No draft release with a .dmg asset found for $RELEASE_TAG"
            exit 1
          fi
          gh api -X PATCH "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -f draft=false \
            -f name="Kosmos ${VERSION}" \
            -f make_latest=true

          # Drop any leftover sibling drafts for the same tag.
          for id in $(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq ".[] | select(.tag_name == \"$RELEASE_TAG\" and .draft == true) | .id"); do
            echo "Deleting orphan draft release id=$id"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
          done

          git push origin HEAD:main
          git push origin "$DESKTOP_TAG"
          git push origin "$RELEASE_TAG" --force
