name: Publish desktop app

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "apps/docs/**"
      - "apps/menubar-tasks/**"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "public/**"
      - "packages/**"
      - "scripts/generate-prompts.ts"
      - "scripts/postinstall.mts"
      - "scripts/sync-desktop-version.mjs"
      - "scripts/check-desktop-version.mjs"
      - "vite.config.ts"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump when run manually"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

# Never cancel mid-upload — that left orphan releases with only .blockmap files.
concurrency:
  group: desktop-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip desktop]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Use npm 12.0.1
        run: npm install --global npm@12.0.1

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Decide whether to release
        id: plan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ship=true" >> "$GITHUB_OUTPUT"
            echo "Manual release requested"
            exit 0
          fi
          if npm run release:should-ship -w @arco/desktop; then
            echo "ship=true" >> "$GITHUB_OUTPUT"
          else
            echo "ship=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve next version
        if: steps.plan.outputs.ship == 'true'
        id: version
        run: |
          BUMP="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}"
          VERSION="$(node apps/desktop/scripts/next-desktop-version.mjs --bump="$BUMP")"
          DESKTOP_TAG="desktop-v${VERSION}"
          RELEASE_TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$DESKTOP_TAG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "Next release: $DESKTOP_TAG (GitHub release $RELEASE_TAG)"

      - name: Guard against duplicate desktop tag
        if: steps.plan.outputs.ship == 'true'
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Sync version files
        if: steps.plan.outputs.ship == 'true'
        run: node scripts/sync-desktop-version.mjs --set "${{ steps.version.outputs.version }}"

      - name: Commit version bump
        if: steps.plan.outputs.ship == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/VERSION package.json apps/desktop/package.json
          git commit -m "chore(desktop): release v${{ steps.version.outputs.version }} [skip desktop]"

      # Draft first so electron-builder can upload without requiring a pre-existing git tag
      # (published releases hit "Published releases must have a valid tag").
      - name: Clear stale release for this version
        if: steps.plan.outputs.ship == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.release_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting stale GitHub release $TAG"
            gh release delete "$TAG" --yes
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -d "$TAG"
          fi
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Build and publish draft to GitHub Releases
        if: steps.plan.outputs.ship == 'true'
        env:
          DESKTOP_VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESKTOP_UPDATE_GH_TOKEN: ${{ secrets.DESKTOP_UPDATE_GH_TOKEN }}
          CSC_LINK: ${{ secrets.DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.DESKTOP_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKTOP_APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DESKTOP_APPLE_TEAM_ID }}
          # Prefer draft upload path even if package.json is overridden locally.
          EP_DRAFT: "true"
        run: npm run release:publish -w @arco/desktop

      - name: Tag, publish release, and push
        if: steps.plan.outputs.ship == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          DESKTOP_TAG="${{ steps.version.outputs.tag }}"

          git tag -a "$DESKTOP_TAG" -m "Kosmos ${VERSION}"
          # electron-builder / gh may already create v* when undrafting — refresh onto this commit.
          git tag -f -a "$RELEASE_TAG" -m "Kosmos ${VERSION}"

          # Point the draft at this commit, then publish so assets become downloadable.
          gh release edit "$RELEASE_TAG" --draft=false --latest --title "Kosmos ${VERSION}"

          git push origin HEAD:main
          git push origin "$DESKTOP_TAG"
          git push origin "$RELEASE_TAG" --force
