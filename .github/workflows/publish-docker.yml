name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kosmos-computer/kosmos

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=-amd64,format=long
            type=sha,prefix=,suffix=-amd64,format=short
            type=raw,value=${{ github.ref_name }}-amd64
            type=raw,value=latest-amd64

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.COOLIFY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H kosmos.tiru.fm >> ~/.ssh/known_hosts

      - name: Deploy to kosmos.tiru.fm
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/deploy-coolify.sh
          SSH_OPTS="-i ~/.ssh/deploy_key -o BatchMode=yes" \
          COOLIFY_HOST="${{ secrets.COOLIFY_HOST }}" \
          GHCR_TOKEN="${GHCR_TOKEN}" \
          GHCR_USER="${GHCR_USER}" \
          ./scripts/deploy-coolify.sh "${SHORT_SHA::7}"
