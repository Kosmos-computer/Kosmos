<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="calc-workspace" aria-label="Calculator">
      <div class="calc-stage">
        <!-- Frame letterboxes to the skin aspect when the window is larger (e.g. maximized). -->
        <div class="calc-stage__frame">
          <div id="calculator-wrap" class="calc-stage__pad"></div>
          <div class="calc-menu">
            <button
              type="button"
              id="menu-toggle"
              class="calc-menu__toggle"
              aria-label="Calculator options"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="menu-panel"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <circle cx="12" cy="5" r="1.75" />
                <circle cx="12" cy="12" r="1.75" />
                <circle cx="12" cy="19" r="1.75" />
              </svg>
            </button>
            <div id="menu-panel" class="calc-menu__panel" role="menu" hidden>
              <div class="calc-menu__section" role="group" aria-label="Skin">
                <div class="calc-menu__label">Skin</div>
                <button type="button" class="calc-menu__item" role="menuitemradio" data-skin="datamath" aria-checked="true">
                  Datamath
                </button>
                <button type="button" class="calc-menu__item" role="menuitemradio" data-skin="omron" aria-checked="false">
                  Omron 86
                </button>
                <button type="button" class="calc-menu__item" role="menuitemradio" data-skin="scientific" aria-checked="false">
                  Scientific
                </button>
              </div>
              <div class="calc-menu__divider" role="separator"></div>
              <button type="button" id="history-toggle" class="calc-menu__item" role="menuitemcheckbox" aria-checked="false">
                Show history
              </button>
            </div>
          </div>
        </div>
      </div>

      <aside id="history-panel" class="calc-history" aria-label="Recent calculations" hidden>
        <div class="calc-history__head">
          <h2 class="calc-history__title">History</h2>
          <button type="button" id="history-close" class="calc-history__close" aria-label="Hide history">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <ul id="history-list" class="calc-history__list"></ul>
        <p id="history-empty" class="calc-history__empty">No calculations yet.</p>
      </aside>

      <div id="error" class="calc-error" hidden></div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
