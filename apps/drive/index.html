<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="drv-sidebar">
        <div class="drv-sidebar__brand">Drive</div>
        <div class="drv-sidebar__actions">
          <button id="new-file" class="drv-btn drv-btn--primary drv-sidebar__new" type="button">
            New file
          </button>
          <button id="new-folder" class="drv-btn drv-sidebar__new-secondary" type="button">New folder</button>
        </div>
        <nav class="drv-sidebar__nav" aria-label="Locations">
          <button id="nav-files" class="drv-nav-item drv-nav-item--active" type="button">
            <span class="drv-icon drv-nav-item__icon" data-icon="folder" aria-hidden="true"></span>
            My files
          </button>
          <button id="nav-starred" class="drv-nav-item" type="button">
            <span class="drv-icon drv-nav-item__icon" data-icon="star" aria-hidden="true"></span>
            Starred
          </button>
          <button id="nav-trash" class="drv-nav-item" type="button">
            <span class="drv-icon drv-nav-item__icon" data-icon="trash-2" aria-hidden="true"></span>
            Trash
          </button>
        </nav>
      </aside>

      <div class="drv-main">
        <nav id="breadcrumbs" class="drv-crumbs" aria-label="Location"></nav>

        <div id="list" class="drv-list" role="list"></div>
        <div id="empty" class="drv-empty" hidden>Nothing here yet.</div>
        <div class="drv-error" id="error" hidden></div>
      </div>
    </div>

    <!-- Text file viewer/editor -->
    <dialog id="file-dialog" class="drv-dialog">
      <div class="drv-dialog__head">
        <h2 id="file-dialog-title"></h2>
        <span id="file-dialog-meta" class="drv-dialog__meta"></span>
      </div>
      <textarea id="file-content" spellcheck="false"></textarea>
      <div class="drv-dialog__actions">
        <span style="flex: 1"></span>
        <button type="button" id="file-cancel" class="drv-btn">Close</button>
        <button type="button" id="file-save" class="drv-btn drv-btn--primary">Save</button>
      </div>
    </dialog>

    <!-- Folder picker for Move -->
    <dialog id="move-dialog" class="drv-dialog drv-dialog--narrow">
      <h2>Move to…</h2>
      <div id="move-list" class="drv-move-list"></div>
      <div class="drv-dialog__actions">
        <span style="flex: 1"></span>
        <button type="button" id="move-cancel" class="drv-btn">Cancel</button>
      </div>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
