# Kosmos control plane — Stripe checkout + automated tenant provisioning.
# Deploy from this directory: fly deploy

app = "kosmos-control-plane"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4700"
  DATA_DIR = "/data"
  GATEWAY_URL = "https://kosmos-gateway.fly.dev"
  TENANT_IMAGE = "registry.fly.io/kosmos-template:demo"
  TENANT_PREFIX = "kosmos"
  TENANT_ORG = "personal"
  TENANT_REGION = "iad"
  TENANT_BUDGET_USD = "5"
  TENANT_MODEL = "qwen3-30b"
  TENANT_QUOTA_MB = "512"
  TENANT_VOLUME_GB = "1"
  FLY_BIN = "/root/.fly/bin/flyctl"

[mounts]
  source = "control_plane_data"
  destination = "/data"

[http_service]
  internal_port = 4700
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
