<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Arco OS</title>
    <script>
      // FOUC-free boot: hydrate theme before first paint (hermes-webui pattern).
      try {
        var t = localStorage.getItem("arco:theme") || "dark";
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
