mutation createPodiumPackage($userEmail: String, $originalFilename: String!, $projectId: String, $languageCode:String, $contentType: String) {
  createPodiumPackage(userEmail: $userEmail, originalFilename: $originalFilename, projectId: $projectId,languageCode: $languageCode, contentType: $contentType) {
    podiumPackageGuid
    url
    key
    AWSAccessKeyId
    policy
    signature
  }
}